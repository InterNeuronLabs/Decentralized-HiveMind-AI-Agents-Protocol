# cargo-deny configuration
# Run: cargo deny check

[advisories]
yanked = "deny"

[licenses]
# Allow only OSI-approved permissive and weak-copyleft licenses
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Zlib",
  "CC0-1.0",
  "OpenSSL",
  "Unicode-3.0",
  "MPL-2.0",
  "CDLA-Permissive-2.0",
]
# Unlisted licenses default to deny; no need for an explicit deny list

[bans]
# Fail if the same crate appears with multiple incompatible versions
multiple-versions = "warn"
wildcards         = "deny"
# Path-only workspace crates have no version constraint by convention
allow-wildcard-paths = true

# Crates explicitly banned for security reasons
deny = [
  # openssl (prefer rustls); native-tls is allowed to use it because
  # ort-sys pulls it in transitively as a build-time download dep only
  { name = "openssl", wrappers = ["native-tls"] },
]

[sources]
# Only allow crates.io and our own git repos
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
